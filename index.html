<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA | NickTheArtist Portfolio</title>
    <style>
        :root {
            --bg-color: #030303;
            --surface-color: rgba(17, 17, 17, 0.7);
            --text-main: #f8f8f8;
            --text-muted: #a1a1aa;
            --accent-primary: #d4af37; /* Gold */
            --accent-bright: #fef08a;
            --transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        
        body { 
            background-color: var(--bg-color);
            color: var(--text-main); line-height: 1.6; overflow-x: hidden; 
        }
        html { scroll-behavior: smooth; }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 1.2s cubic-bezier(0.8, 0, 0.2, 1), visibility 1.2s;
        }
        #intro-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .intro-logo {
            font-size: 2.5rem; font-weight: 900; color: var(--accent-primary);
            letter-spacing: 10px; text-transform: uppercase; animation: introPulse 2s infinite;
        }
        .intro-text { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 4px; margin-top: 20px; text-transform: uppercase; }
        @keyframes introPulse { 0% { opacity: 0.5; text-shadow: 0 0 10px rgba(212,175,55,0.2); } 50% { opacity: 1; text-shadow: 0 0 30px rgba(212,175,55,0.8); } 100% { opacity: 0.5; text-shadow: 0 0 10px rgba(212,175,55,0.2); } }

        /* --- BACKGROUND SMOKE CANVAS --- */
        #smokeCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.6;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 99998; pointer-events: none;
        }
        .cursor-dot { width: 6px; height: 6px; background-color: var(--accent-primary); box-shadow: 0 0 10px var(--accent-primary); }
        .cursor-outline { width: 30px; height: 30px; border: 1px solid rgba(212, 175, 55, 0.6); transition: width 0.15s, height 0.15s, background-color 0.15s; }
        .cursor-hover .cursor-outline { width: 50px; height: 50px; background-color: rgba(212, 175, 55, 0.05); border-color: var(--accent-bright); }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes goldPulse { 0% { text-shadow: 0 0 0px rgba(212, 175, 55, 0); } 50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); } 100% { text-shadow: 0 0 0px rgba(212, 175, 55, 0); } }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .site-content { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
        .site-content.visible { opacity: 1; visibility: visible; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(3, 3, 3, 0.6);
            backdrop-filter: blur(12px); padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            transform: translateY(-100%); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        nav.nav-visible { transform: translateY(0); }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--accent-primary); letter-spacing: 2px; text-decoration: none; transition: var(--transition); }
        .logo:hover { letter-spacing: 4px; color: var(--accent-bright); }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav a { color: var(--text-main); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: var(--transition); opacity: 0.7; }
        nav a:hover { opacity: 1; color: var(--accent-primary); transform: translateY(-2px); display: inline-block; }

        /* Hero Section */
        #home {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            padding: 0 5%; position: relative;
        }
        .hero-tag.animate { animation: fadeInUp 0.8s ease forwards; }
        .hero-tag { color: var(--accent-primary); letter-spacing: 8px; text-transform: uppercase; font-weight: 800; font-size: 0.8rem; margin-bottom: 1rem; opacity: 0; }
        h1.animate { animation: fadeInUp 1s ease 0.2s forwards; }
        h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; opacity: 0; letter-spacing: -2px; }
        .gold { color: var(--accent-primary); animation: goldPulse 4s infinite; }
        #home p.animate { animation: fadeInUp 1s ease 0.4s forwards; }
        #home p { max-width: 550px; color: var(--text-muted); opacity: 0; }

        /* Portfolio Grid */
        #portfolio { padding: 100px 5%; max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 50px; perspective: 1000px; }
        
        .item {
            background: var(--surface-color); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden;
            transition: transform 0.1s ease-out, border-color 0.4s, box-shadow 0.4s; position: relative;
            transform-style: preserve-3d;
        }
        .item::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); opacity: 0.8; transition: var(--transition); pointer-events: none;
        }
        .item:hover { border-color: rgba(212, 175, 55, 0.4); z-index: 10; box-shadow: 0 30px 50px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.1); }
        .item:hover::after { opacity: 0.3; }
        .item img { width: 100%; height: 260px; object-fit: cover; transition: transform 0.8s ease; }
        .item:hover img { transform: scale(1.08); }
        
        .info { padding: 25px; position: relative; z-index: 2; transition: transform 0.3s; pointer-events: none; transform: translateZ(30px); }
        .info p { color: var(--accent-primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
        .info h3 { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        /* Contact Section */
        #contact { padding: 150px 5%; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 2; }
        .contact-container { max-width: 500px; margin: 0 auto; }
        .btn-group { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        
        .btn {
            display: block; padding: 22px; text-decoration: none; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 3px; border-radius: 4px; transition: transform 0.2s ease-out, background 0.4s, box-shadow 0.4s;
            position: relative; overflow: hidden;
        }
        .btn-gold { background: var(--accent-primary); color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .btn-gold:hover { background: var(--accent-bright); letter-spacing: 5px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        
        .btn-outline { background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .btn-outline:hover { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(212, 175, 55, 0.05); letter-spacing: 5px; }

        /* --- LIGHTBOX (Enhanced Cinematic Open) --- */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(20px); opacity: 0; transition: opacity 0.5s ease;
        }
        #lightbox.show { display: flex; opacity: 1; }
        #lightbox img { 
            max-width: 100%; max-height: 85vh; border: 1px solid rgba(212, 175, 55, 0.5); 
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.2); 
            transform: scale(0.8) translateY(20px); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.6s ease;
            border-radius: 4px; 
        }
        #lightbox.show img { transform: scale(1) translateY(0); opacity: 1; }

        @media (max-width: 768px) { nav ul { display: none; } h1 { font-size: 3.5rem; } * { cursor: auto; } .cursor-dot, .cursor-outline, #smokeCanvas { display: none; } .item { transform: none !important; } }
    </style>
</head>

    <audio id="closeSfx" src="https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3" preload="auto"></audio>

    <div id="intro-screen" class="hover-target">
        <div class="intro-logo">NTA.</div>
        <div class="intro-text">Click Anywhere to Enter</div>
    </div>

    <div class="site-content" id="main-content">
        <canvas id="smokeCanvas"></canvas>

        <nav id="navbar">
            <a href="#home" class="logo hover-target">NTA.</a>
            <ul>
                <li><a href="#home" class="hover-target">Home</a></li>
                <li><a href="#portfolio" class="hover-target">Work</a></li>
                <li><a href="#contact" class="hover-target">Contact</a></li>
            </ul>
        </nav>

            <p class="hero-tag" id="h-tag">NickTheArtist</p>
