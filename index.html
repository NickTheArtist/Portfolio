<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA | NickTheArtist Portfolio</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #111111;
            --text-main: #f8f8f8;
            --text-muted: #a1a1aa;
            --accent-primary: #d4af37; /* Gold */
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }
        html { scroll-behavior: smooth; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px); padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent-primary); letter-spacing: 2px; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: var(--text-main); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }

        /* Hero Section */
        #home {
            height: 70vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at top, #1a1710 0%, var(--bg-color) 80%);
            padding: 0 5%;
        }
        h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        .gold { color: var(--accent-primary); }

        /* Portfolio Grid */
        #portfolio { padding: 80px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto;
        }
        .item {
            background: var(--surface-color);
            border: 1px solid #222;
            border-radius: 5px;
            overflow: hidden;
            transition: var(--transition);
        }
        .item:hover { border-color: var(--accent-primary); transform: translateY(-5px); }
        .item img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .info { padding: 15px; }

        /* Contact */
        #contact { padding: 100px 5%; text-align: center; background: var(--surface-color); }
        .btn {
            display: inline-block; padding: 12px 30px; background: var(--accent-primary);
            color: black; text-decoration: none; font-weight: bold; border-radius: 3px;
            margin: 10px; transition: var(--transition);
        }
        .btn:hover { transform: scale(1.05); background: #fef08a; }

        /* Lightbox (Click to enlarge) */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 80vh; border: 2px solid var(--accent-primary); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NTA.</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#portfolio">Work</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <p style="color: var(--accent-primary); letter-spacing: 3px;">NICKTHEARTIST</p>
        <h1>Visual <span class="gold">Excellence</span></h1>
        <p>Custom headers and banners designed for everyone.</p>
    </section>

    <section id="portfolio">
        <h2 style="text-align: center; text-transform: uppercase;">My Work</h2>
        <div class="grid" id="portfolioGrid">
            </div>
    </section>

    <section id="contact">
        <h2>Let's Work Together</h2>
        <p style="margin-bottom: 20px;">Ready for your own custom design?</p>
        <a href="https://guns.page/YOUR_USERNAME" target="_blank" class="btn">Guns.page</a>
        <a href="#" onclick="alert('Discord: NTA#1234')" class="btn" style="background: transparent; color: white; border: 1px solid white;">Discord</a>
    </section>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lbImg" src="">
    </div>

    <script>
        // THIS IS THE ONLY PART YOU NEED TO EDIT LATER
        // To add more work, just copy a line and change the name!
        const myImages = [
            { name: "Shinra", file: "header1.jpg" },
            { name: "Aizen", file: "header2.jpg" },
            { name: "Toji", file: "header3.jpg" },
            { name: "Arthur", file: "header4.jpg" },
            { name: "02", file: "header5.jpg" },
            { name: "Arima", file: "header6.jpg" }
        ];

        const grid = document.getElementById('portfolioGrid');
        
        grid.innerHTML = myImages.map(img => `
            <div class="item">
                <img src="${img.file}" onclick="openImg('${img.file}')" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Not+Found'">
                <div class="info">
                    <p style="color:var(--accent-primary); font-size: 12px;">HEADER</p>
                    <h3 style="font-size: 16px;">${img.name}</h3>
                </div>
            </div>
        `).join('');

        function openImg(src) {
            document.getElementById('lbImg').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
