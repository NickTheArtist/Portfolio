<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA | NickTheArtist Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: rgba(15, 15, 15, 0.8);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f8f8f8;
            --text-muted: #888888;
            --accent-primary: #CFA960; 
            --accent-bright: #E8CA8B;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        
        body { 
            background-color: var(--bg-color);
            color: var(--text-main); line-height: 1.6; overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }
        html { scroll-behavior: smooth; }

        /* --- CINEMATIC ZOOM INTRO SCREEN --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #050505; z-index: 99999; display: flex; 
            justify-content: center; align-items: center; flex-direction: column;
            cursor: pointer; overflow: hidden;
            transition: background-color 0.1s ease;
        }
        
        .intro-logo {
            font-size: 2.5rem; font-weight: 900; color: var(--accent-primary);
            letter-spacing: 20px; text-transform: uppercase; 
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.8s ease;
            z-index: 2; transform-origin: center center; margin-right: -20px; 
            text-align: center;
        }
        
        .intro-text { 
            color: var(--text-muted); font-size: 0.7rem; letter-spacing: 6px; 
            margin-top: 30px; text-transform: uppercase; transition: opacity 0.3s ease;
            text-align: center; margin-right: -6px; font-weight: 400;
        }

        .intro-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--text-main); opacity: 0; pointer-events: none;
            z-index: 3; mix-blend-mode: overlay; transition: opacity 0.5s ease-out;
        }

        #intro-screen.open { background-color: transparent; pointer-events: none; transition: background-color 0.8s ease 0.2s; }
        #intro-screen.open .intro-text { opacity: 0; }
        #intro-screen.open .intro-logo { transform: scale(40); opacity: 0; filter: blur(10px); }
        #intro-screen.open .intro-flash { animation: flashBang 1s ease-out forwards; }
        
        @keyframes flashBang { 0% { opacity: 0; } 15% { opacity: 0.3; } 100% { opacity: 0; } }

        /* --- MAIN SITE SLAM REVEAL --- */
        .site-content { 
            opacity: 0; visibility: hidden; 
            transform: scale(1.03); filter: blur(10px);
            transition: opacity 1s ease, transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), filter 1.2s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .site-content.visible { opacity: 1; visibility: visible; transform: scale(1); filter: blur(0px); }

        /* --- BACKGROUND SMOKE CANVAS --- */
        #smokeCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.25; 
        }

        /* --- HARDWARE ACCELERATED CUSTOM CURSOR (FIXED) --- */
        .cursor-dot {
            position: fixed; top: 0; left: 0;
            width: 4px; height: 4px; background-color: var(--accent-bright);
            border-radius: 50%; z-index: 99999; pointer-events: none;
            will-change: transform;
            /* Starts hidden offscreen to prevent flash */
            transform: translate3d(-100px, -100px, 0);
        }
        .cursor-outline {
            position: fixed; top: 0; left: 0;
            width: 36px; height: 36px; border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; z-index: 99998; pointer-events: none;
            will-change: transform, width, height, background-color, border-color;
            /* Strict transition locks out transform lag */
            transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
            transform: translate3d(-100px, -100px, 0);
        }
        .cursor-hover .cursor-outline { 
            width: 60px; height: 60px; 
            background-color: rgba(255, 255, 255, 0.03); 
            border-color: var(--accent-primary); 
        }

        /* --- DYNAMIC SPRING SCROLL ANIMATIONS --- */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); filter: blur(4px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        .reveal { 
            opacity: 0; 
            transform: translateY(120px) scale(0.85) rotateX(15deg); 
            transform-origin: center bottom;
            filter: blur(12px); 
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1s ease; 
            display: block; 
            height: 100%; 
            will-change: transform, opacity, filter;
            perspective: 1000px;
        }

            opacity: 1; 
            transform: translateY(0) scale(1) rotateX(0deg); 
            filter: blur(0px
