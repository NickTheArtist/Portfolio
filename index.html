<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTA | NickTheArtist Portfolio</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #111111;
            --text-main: #f8f8f8;
            --text-muted: #a1a1aa;
            --accent-primary: #d4af37; /* Gold */
            --accent-bright: #fef08a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
        html { scroll-behavior: smooth; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px); padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--accent-primary); letter-spacing: 2px; text-decoration: none; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: var(--text-main); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: var(--transition); }
        nav a:hover { color: var(--accent-primary); }

        /* Hero Section */
        #home {
            height: 80vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at top, #1a1710 0%, var(--bg-color) 80%);
            padding: 0 5%;
        }
        .hero-tag { color: var(--accent-primary); letter-spacing: 5px; text-transform: uppercase; font-weight: 800; font-size: 0.9rem; margin-bottom: 0.5rem; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; }
        .gold { color: var(--accent-primary); }

        /* Portfolio Grid */
        #portfolio { padding: 100px 5%; max-width: 1400px; margin: 0 auto; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }
        .item {
            background: var(--surface-color);
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .item:hover { border-color: var(--accent-primary); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .item img { width: 100%; height: 220px; object-fit: cover; transition: 0.5s; }
        .info { padding: 20px; }
        .info p { color: var(--accent-primary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .info h3 { font-size: 1.1rem; font-weight: 700; }

        /* Contact Section */
        #contact { padding: 120px 5%; text-align: center; background: var(--surface-color); border-top: 1px solid #1a1a1a; }
        .contact-container { max-width: 500px; margin: 0 auto; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 35px; }
        
        .btn {
            display: block; padding: 18px; text-decoration: none; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; transition: var(--transition);
        }
        .btn-gold { background: var(--accent-primary); color: #000; }
        .btn-gold:hover { background: var(--accent-bright); transform: scale(1.02); }
        
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid #333; }
        .btn-outline:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

        /* Lightbox */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        #lightbox img { max-width: 100%; max-height: 85vh; border: 1px solid var(--accent-primary); box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }

        @media (max-width: 768px) { nav ul { display: none; } h1 { font-size: 2.8rem; } }
    </style>
</head>
<body>

    <nav>
        <a href="#home" class="logo">NTA.</a>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#portfolio">Work</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <p class="hero-tag">NickTheArtist</p>
        <h1>Visual <span class="gold">Excellence</span></h1>
        <p style="color: var(--text-muted); max-width: 550px;">Custom headers and banners built to stand out. Elevate your presence with high-tier digital graphics.</p>
    </section>

    <section id="portfolio">
        <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">Archive / <span class="gold">Work</span></h2>
        <div class="grid" id="portfolioGrid"></div>
    </section>

    <section id="contact">
        <div class="contact-container">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">LET'S WORK.</h2>
            <p style="color: var(--text-muted);">Ready for your own custom design?</p>
            
            <div class="btn-group">
                <a href="https://guns.lol/nicktheartist" target="_blank" class="btn btn-gold">View Guns.lol</a>
                <a href="https://discord.com/users/981743684980715580" target="_blank" class="btn btn-outline">Get in contact with me!</a>
            </div>
        </div>
    </section>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lbImg" src="">
    </div>

    <script>
        // Your current image list
        const myImages = [
            { name: "Shinra", file: "header1.jpg" },
            { name: "Aizen", file: "header2.jpg" },
            { name: "Toji", file: "header3.jpg" },
            { name: "Arthur", file: "header4.jpg" },
            { name: "02", file: "header5.jpg" },
            { name: "Arima", file: "header6.jpg" }
        ];

        const grid = document.getElementById('portfolioGrid');
        
        grid.innerHTML = myImages.map(img => `
            <div class="item" onclick="openImg('${img.file}')">
                <img src="${img.file}" onerror="this.src='https://via.placeholder.com/600x300?text=Header+Not+Found'">
                <div class="info">
                    <p>Header / Design</p>
                    <h3>${img.name}</h3>
                </div>
            </div>
        `).join('');

        function openImg(src) {
            document.getElementById('lbImg').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
